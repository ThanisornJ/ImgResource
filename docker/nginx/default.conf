# Rate limiting zones
limit_req_zone $binary_remote_addr zone=one:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Map to identify localhost
map $remote_addr $is_localhost {
    3.0.120.252   1;
    13.251.88.114 1;
    13.250.8.225  1;
    127.0.0.1     1;
    default       0;
}

# Map to identify curl user agent
map $http_user_agent $is_curl {
    "~*Curl"     1;
    default      0;
}

# Map to determine if curl should be blocked
map "$is_curl:$is_localhost" $block_curl {
    "1:1"     0;  # curl from localhost - don't block
    "1:0"     1;  # curl from elsewhere - block
    default   0;  # not curl - don't block
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;
    root /var/www/html/public;

    # Disable server tokens
    server_tokens off;

    http2 on;

    set_real_ip_from 10.110.27.10;

    # SSL optimization
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;  # Modern SSL protocols
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (uncomment if you're sure)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Increase request size
    client_max_body_size 40M;

    # RSA certificate
    ssl_certificate /etc/nginx/cert.crt;
    ssl_certificate_key /etc/nginx/cert.key;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(),midi=(),sync-xhr=(),microphone=(),camera=(),magnetometer=(),gyroscope=(),fullscreen=(self),payment=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://tile.citycontext.info https://analytics.sdd.oou.cmu.ac.th https://static.line-scdn.net blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://tile.citycontext.info https://fonts.googleapis.com https://fonts.bunny.net; font-src 'self' https://fonts.gstatic.com https://fonts.bunny.net; img-src 'self' data: https://tile.citycontext.info https://*.sdd.oou.cmu.ac.th https://profile.line-scdn.net https://obs.line-scdn.net blob:; connect-src 'self' https://tile.citycontext.info https://analytics.sdd.oou.cmu.ac.th https://login.microsoftonline.com https://api.line.me https://liff.line.me https://access.line.me https://*.line-scdn.net; frame-src 'self' https://access.line.me https://liff.line.me https://*.line.me; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none';" always;

    # DDoS protection
    limit_req zone=one burst=100 nodelay;
    limit_conn addr 50;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 5s 5s;
    send_timeout 10s;

    # Bad Bot Protection - Always block these bots
    if ($http_user_agent ~* (msnbot|Scrapy|Wget|YandexBot|SemrushBot|AhrefsBot)) {
        return 403;
    }
    
    # Block curl if determined by our mapping
    if ($block_curl) {
        return 403;
    }

    # Restrict methods
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 444;
    }

    # Proxy headers
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;

    index index.php;
    charset utf-8;

    # Access log with 4KB buffer
    access_log /var/log/nginx/access.log combined buffer=4k flush=5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Serve files from navigation.oou.cmu.ac.th
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "https://navigation.oou.cmu.ac.th";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        try_files $uri =404;
    }

    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "https://navigation.oou.cmu.ac.th";
    }

    location = /favicon.ico { 
        access_log off; 
        log_not_found off; 
        expires 30d;
    }
    location = /robots.txt  { 
        access_log off; 
        log_not_found off; 
    }

    error_page 497 301 =307 https://$host:$server_port$request_uri;
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_pass unix:/var/run/phpx-fpm.sock;
        
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
        fastcgi_hide_header X-Powered-By;
        fastcgi_hide_header X-CF-Powered-By;
        fastcgi_hide_header X-Runtime;
        
        # Mitigate PHP CGI vulnerabilities
        fastcgi_param PHP_VALUE "cgi.fix_pathinfo=0";
        fastcgi_intercept_errors on;
        
        # Timeout configurations
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_connect_timeout 60s;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|git|yml|yaml|xml|ini|conf|md|sql|config|bak|txt)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to scripts in upload directories
    location ~* /(?:uploads|files|wp-content|wp-includes)/.*\.php$ {
        deny all;
    }
}

# HTTP redirect with security headers
server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    # Security headers for redirect
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    return 301 https://$host$request_uri;
}